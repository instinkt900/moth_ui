name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        os: [windows, linux]
        build_type: [Release, Debug]
        include:
          - os: windows
            runs_on: windows-latest
          - os: linux
            runs_on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Build package
      run: |
        conan create . --profile conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=${{ matrix.build_type }}

  test:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        os: [windows, linux]
        include:
          - os: windows
            runs_on: windows-latest
            configure_preset: conan-default
          - os: linux
            runs_on: ubuntu-latest
            configure_preset: conan-debug

    steps:
    - uses: actions/checkout@v4

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Install dependencies
      working-directory: tests
      run: |
        conan install . --profile ../conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=Debug

    - name: Configure
      working-directory: tests
      run: cmake --preset ${{ matrix.configure_preset }}

    - name: Build
      working-directory: tests
      run: cmake --build --preset conan-debug

    - name: Run tests
      working-directory: tests
      run: ctest --preset conan-debug --output-on-failure
