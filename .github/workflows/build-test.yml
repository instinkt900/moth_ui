name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'conan/**'
      - 'version.txt'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'conan/**'
      - 'version.txt'

jobs:
  build:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - os: windows
            build_type: Release
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-release
          - os: windows
            build_type: Debug
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-debug
          - os: linux
            build_type: Release
            runs_on: ubuntu-latest
            configure_preset: conan-release
            build_preset: conan-release
          - os: linux
            build_type: Debug
            runs_on: ubuntu-latest
            configure_preset: conan-debug
            build_preset: conan-debug

    steps:
    - uses: actions/checkout@v4

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Install dependencies
      run: conan install . --profile conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=${{ matrix.build_type }}

    - name: Configure and build
      shell: bash
      run: |
        cmake --preset ${{ matrix.configure_preset }}
        cmake --build --preset ${{ matrix.build_preset }} --config ${{ matrix.build_type }}

  test:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        os: [windows, linux]
        include:
          - os: windows
            runs_on: windows-latest
            configure_preset: conan-default
          - os: linux
            runs_on: ubuntu-latest
            configure_preset: conan-debug

    steps:
    - uses: actions/checkout@v4

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Install dependencies
      working-directory: tests
      run: |
        conan install . --profile ../conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=Debug

    - name: Configure
      working-directory: tests
      run: cmake --preset ${{ matrix.configure_preset }}

    - name: Build
      working-directory: tests
      run: cmake --build --preset conan-debug

    - name: Run tests
      working-directory: tests
      run: ctest --preset conan-debug --output-on-failure
