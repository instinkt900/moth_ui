name: Upload Library

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if version has not changed.'
        type: boolean
        default: false
      test:
        description: 'Test run. Will not create release or tags.'
        type: boolean
        default: false
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'version.txt'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version.txt changed
        id: check
        run: |
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [[ -z "${{ github.event.before }}" ]]; then
            if git diff HEAD^ HEAD --name-only 2>/dev/null | grep -q "^version.txt$"; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff "${{ github.event.before }}..${{ github.sha }}" --name-only 2>/dev/null | grep -q "^version.txt$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

  conan-upload:
    if: github.repository == 'instinkt900/moth_ui'
    needs: check-version
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - os: windows
            runs_on: windows-latest
          - os: linux
            runs_on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Build package and upload
      run: |
        conan remote add artifactory ${{ vars.ARTIFACTORY_URL }} --force
        conan remote login artifactory ci -p ${{ secrets.ARTIFACTS_TOKEN }}
        conan create . -s compiler.cppstd=17 -s build_type=Release --build=missing -c tools.system.package_manager:mode=install -c tools.system.package_manager:sudo=true
        conan upload "moth_ui/${{ needs.check-version.outputs.version }}:*" --confirm --remote artifactory

  build-release:
    if: github.repository == 'instinkt900/moth_ui' && needs.check-version.outputs.changed == 'true'
    needs: check-version
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - os: windows
            build_type: Release
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-release
          - os: windows
            build_type: Debug
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-debug
          - os: linux
            build_type: Release
            runs_on: ubuntu-latest
            configure_preset: conan-release
            build_preset: conan-release
          - os: linux
            build_type: Debug
            runs_on: ubuntu-latest
            configure_preset: conan-debug
            build_preset: conan-debug

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Configure and build
      shell: bash
      run: |
        conan install . -s compiler.cppstd=17 -s build_type=${{ matrix.build_type }} --build=missing -c tools.system.package_manager:mode=install -c tools.system.package_manager:sudo=true
        cmake --preset ${{ matrix.configure_preset }}
        cmake --build --preset ${{ matrix.build_preset }} --config ${{ matrix.build_type }}

    - name: Install to staging directory
      if: matrix.os == 'linux'
      run: cmake --install build/${{ matrix.build_type }} --config ${{ matrix.build_type }} --prefix staging

    - name: Install to staging directory
      if: matrix.os == 'windows'
      run: cmake --install build --config ${{ matrix.build_type }} --prefix staging

    - name: Archive (Linux)
      if: matrix.os == 'linux'
      run: |
        mv staging moth_ui-${{ needs.check-version.outputs.version }}
        tar czf moth_ui-${{ needs.check-version.outputs.version }}-linux-${{ matrix.build_type }}.tar.gz moth_ui-${{ needs.check-version.outputs.version }}

    - name: Archive (Windows)
      if: matrix.os == 'windows'
      shell: pwsh
      run: |
        Rename-Item staging moth_ui-${{ needs.check-version.outputs.version }}
        Compress-Archive -Path moth_ui-${{ needs.check-version.outputs.version }} -DestinationPath moth_ui-${{ needs.check-version.outputs.version }}-windows-${{ matrix.build_type }}.zip

    - name: Upload archive as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: moth_ui-${{ matrix.os }}-${{ matrix.build_type }}
        path: moth_ui-${{ needs.check-version.outputs.version }}-*
        retention-days: 1

  tag-and-release:
    if: github.repository == 'instinkt900/moth_ui' && needs.check-version.outputs.changed == 'true' && github.event.inputs.test != 'true'
    needs: [check-version, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          tag_exists_error: false
          force_push_tag: true

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate release notes (current version only)
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --current --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md to master
        run: |
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG.md for ${{ needs.check-version.outputs.version }} [skip ci]"
          git fetch origin master
          git rebase origin/master || { echo "Rebase failed; aborting to avoid overwriting remote history"; git rebase --abort; exit 1; }
          git push origin master

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: "moth_ui ${{ needs.check-version.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: release-assets/*
